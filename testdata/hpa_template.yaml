apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .ResourceName }}
  namespace: {{ .Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .DeploymentName }}
  minReplicas: {{ .MinReplicas }}
  maxReplicas: {{ .MaxReplicas }}
  {{- if .Metrics }}
  metrics:
  {{- range .Metrics }}
  - type: Resource
    resource:
      name: {{ .Name }}
      target:
        type: AverageValue
        averageValue: {{ .AverageValue }}
  {{- end }}
  {{- end }}
  {{- if .StabilizationWindowSeconds }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .StabilizationWindowSeconds }}
  {{- end }}